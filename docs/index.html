<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>idea 2 - Simple Productivity App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #FFFFF2;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #333;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #666;
        }

        .description {
            font-size: 1.1rem;
            color: #666;
            margin: 2rem 0;
            line-height: 1.8;
        }

        .screenshot {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin: 2rem 0;
        }

        .features {
            margin: 2rem 0;
        }

        .feature-text {
            font-size: 1.1rem;
            color: #666;
            margin: 0.5rem 0;
        }

        .download-button {
            display: inline-block;
            background-color: #333;
            color: white;
            padding: 12px 24px;
            border: 1px solid #333;
            text-decoration: none;
            font-size: 1rem;
            margin-top: 2rem;
        }

        .download-button:hover {
            background-color: white;
            color: #333;
        }

        .platform-info {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #888;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>idea 2</h1>
        <p class="subtitle">Simple Productivity App</p>
        
        <p class="description">
            Keep your thoughts organized and stay productive with idea 2. 
            A clean, minimal app for taking notes and managing your tasks.
        </p>

        <img src="screenshot.png" alt="idea 2 app screenshot" class="screenshot">

        <a href="https://github.com/adeveloperduck/idea-2/releases/tag/release" class="download-button">
            Download for Mac
        </a>
        
        <p class="platform-info">
            Compatible with macOS
        </p>
    </div>
</body>
</html>
